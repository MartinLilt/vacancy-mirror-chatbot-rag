version: "3.9"
# =============================================================================
# ⚠️  LEGACY — superseded by docker-compose.backend.yml
# This file is kept for reference only. DO NOT deploy.
# Use docker-compose.backend.yml which adds:
#   - internal/egress network isolation
#   - security_opt, cap_drop, read_only hardening
#   - assistant-infer horizontal replicas
#   - api (FastAPI) service
#   - grafana-backend service
# =============================================================================
# Server 1 (178.104.113.58) — Backend stack
# Services: postgres (pgvector), backend (Telegram bot + RAG + embeddings)
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacancy_mirror
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - /etc/vacancy-mirror/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Bind PostgreSQL to localhost only (not publicly reachable).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vacancy_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/martinlilt/vacancy-mirror-backend:latest
    container_name: backend
    restart: unless-stopped
    environment:
      DB_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/vacancy_mirror
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SUPPORT_ADMIN_ID: ${SUPPORT_ADMIN_ID:-}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:-}
      STRIPE_PLUS_URL: ${STRIPE_PLUS_URL:-}
      STRIPE_PRO_PLUS_URL: ${STRIPE_PRO_PLUS_URL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUPPORT_API_TOKEN: ${SUPPORT_API_TOKEN:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SUPPORT_FROM_EMAIL: ${SUPPORT_FROM_EMAIL:-support@vacancy-mirror.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID:-}
      CHATWOOT_API_ACCESS_TOKEN: ${CHATWOOT_API_ACCESS_TOKEN:-}
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN:-}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8080}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      # Scraper API endpoint (on Server 2)
      SCRAPER_API_URL: ${SCRAPER_API_URL:-}
      SCRAPER_API_KEY: ${SCRAPER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli telegram-bot

  support-webhook:
    image: ghcr.io/martinlilt/vacancy-mirror-backend:latest
    restart: unless-stopped
    environment:
      DB_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/vacancy_mirror
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      STRIPE_PLUS_URL: ${STRIPE_PLUS_URL:-}
      STRIPE_PRO_PLUS_URL: ${STRIPE_PRO_PLUS_URL:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUPPORT_API_TOKEN: ${SUPPORT_API_TOKEN:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SUPPORT_FROM_EMAIL: ${SUPPORT_FROM_EMAIL:-support@vacancy-mirror.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN:-}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8080}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli stripe-webhook --port 8080

volumes:
  postgres-data:
