# Nginx reverse proxy for api.vacancy-mirror.com
# Deployed to /etc/vacancy-mirror/nginx.conf by provision.sh
#
# nginx runs on the HOST (systemd), not inside Docker.
# All upstreams are reached via 127.0.0.1:PORT (published Docker ports).
# Do NOT use Docker hostnames or resolver 127.0.0.11 — that DNS is only
# available inside Docker network namespaces, not from the host.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.vacancy-mirror.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to backend services via localhost published ports
server {
    listen 443 ssl;
    server_name api.vacancy-mirror.com;

    ssl_certificate     /etc/letsencrypt/live/api.vacancy-mirror.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vacancy-mirror.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Stripe webhook endpoint → support-webhook container (127.0.0.1:8080)
    location = /webhook {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Support API endpoints → support-webhook container (127.0.0.1:8080)
    location /support/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else → FastAPI api container (127.0.0.1:8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
