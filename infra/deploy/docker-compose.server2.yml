# =============================================================================
# Server 2 (178.104.110.28) — Scraper stack
# Services: postgres (local), flaresolverr, scraper (cron + scraper-api:8000),
#           grafana, prometheus, node-exporter
#
# Networks:
#   internal — no internet access (postgres, prometheus, node-exporter, grafana)
#   egress   — internet access   (scraper, flaresolverr)
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    environment:
      POSTGRES_DB: vacancy_mirror
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - /etc/vacancy-mirror/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Bind PostgreSQL to localhost only (not publicly reachable).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vacancy_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      LOG_LEVEL: info
      LOG_HTML: false
      CAPTCHA_SOLVER: none
      TZ: UTC
      # Keep FlareSolverr proxy separate from scraper Chrome proxy.
      # Default is direct egress (empty), because some authenticated proxies
      # fail inside Chromium with ERR_NO_SUPPORTED_PROXIES.
      PROXY_URL: ${FLARESOLVERR_PROXY_URL:-}
    ports:
      - "127.0.0.1:8191:8191"
    networks:
      - internal   # → reachable by scraper
      - egress     # → needs internet for Upwork/Cloudflare

  scraper:
    image: ghcr.io/martinlilt/vacancy-mirror-scraper:latest
    container_name: scraper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      # Local postgres (on this same server)
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/vacancy_mirror
      # Scraper API auth key (for POST /scrape and POST /jobs/clear)
      SCRAPER_API_KEY: ${SCRAPER_API_KEY}
      # Residential proxy for nodriver Chrome only
      PROXY_URL: ${PROXY_URL:-}
      # Chrome session persistence
      CHROME_USER_DATA_DIR: /app/data/chrome_profile
      COOKIE_BACKUP_PATH: /app/data/session_cookies.json
      # FlareSolverr
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
      # Dedicated sticky proxy for FlareSolverr (supports session rotation)
      FLARESOLVERR_PROXY_URL: ${FLARESOLVERR_PROXY_URL:-}
      # Runtime knobs for Cloudflare timeout handling
      FLARESOLVERR_MAX_TIMEOUT_MS: ${FLARESOLVERR_MAX_TIMEOUT_MS:-120000}
      FLARESOLVERR_TIMEOUT_COOLDOWN_SEC: ${FLARESOLVERR_TIMEOUT_COOLDOWN_SEC:-35}
      FLARESOLVERR_TIMEOUT_BACKOFF_MULT: ${FLARESOLVERR_TIMEOUT_BACKOFF_MULT:-1.8}
      FLARESOLVERR_ROTATE_AFTER_TIMEOUTS: ${FLARESOLVERR_ROTATE_AFTER_TIMEOUTS:-999}
      # Webshare API for real proxy usage telemetry
      WEBSHARE_API_KEY: ${WEBSHARE_API_KEY:-}
    ports:
      # scraper-api (FastAPI) on port 8000
      - "127.0.0.1:8000:8000"
    volumes:
      - scraper-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    networks:
      - internal   # → postgres, flaresolverr
      - egress     # → upwork.com, webshare proxy, webshare API

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /etc/vacancy-mirror/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - internal   # scrapes node-exporter via internal network. NO internet.

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - internal   # Only needs to be scraped by prometheus. NO internet.

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - /etc/vacancy-mirror/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - postgres
    networks:
      - internal   # → prometheus, postgres. NO internet.

networks:
  internal:
    driver: bridge
    internal: true     # ← No internet access from this network
  egress:
    driver: bridge     # ← Normal bridge with internet access

volumes:
  postgres-data:
  scraper-data:
  prometheus-data:
  grafana-data:
