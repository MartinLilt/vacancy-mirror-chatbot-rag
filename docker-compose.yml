version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacancy_mirror
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vacancy_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/martinlilt/vacancy-mirror-backend:latest
    container_name: backend
    restart: unless-stopped
    environment:
      DB_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/vacancy_mirror
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli telegram-bot

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: false
      CAPTCHA_SOLVER: none
      TZ: UTC
      # Keep FlareSolverr proxy separate from scraper proxy.
      # Default: no proxy for FlareSolverr unless explicitly set.
      PROXY_URL: ${FLARESOLVERR_PROXY_URL:-}
    ports:
      - "8191:8191"

  scraper:
    image: ghcr.io/martinlilt/vacancy-mirror-scraper:latest
    container_name: scraper
    restart: "no"
    environment:
      # Database connection - use DATABASE_URL from .env for external server
      DATABASE_URL: ${DATABASE_URL}

      # Residential proxy (Webshare rotating)
      PROXY_URL: ${PROXY_URL:-}

      # Chrome session persistence
      CHROME_USER_DATA_DIR: /app/data/chrome_profile
      COOKIE_BACKUP_PATH: /app/data/session_cookies.json

      # Category UID (for single-category runs)
      CATEGORY_UID: ${CATEGORY_UID:-}

      # FlareSolverr API endpoint
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
    volumes:
      # Persist Chrome session + cookies + checkpoints across restarts
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      flaresolverr:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://178.104.110.28:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - postgres

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
