# Backend stack — runs on server-backend
# Deployed to /etc/vacancy-mirror/docker-compose.yml by provision.sh
#
# Services:
#   postgres          — persistent DB (pgvector)
#   backend           — Telegram bot (pulls from ghcr.io)
#   support-webhook   — Stripe webhook handler (port 8080, localhost only)
#   api               — FastAPI (web/api, pulls from ghcr.io)
#   grafana-backend   — monitoring dashboard (port 3001, localhost only)
#
# Networks:
#   internal — no internet access (postgres, grafana)
#   egress   — internet access   (backend, assistant-infer, support-webhook, api)
#
# Reverse proxy: host-level nginx (systemd) on port 80/443

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    env_file:
      - /etc/vacancy-mirror/backend.env
    environment:
      POSTGRES_DB: vacancy_mirror
      POSTGRES_USER: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - /etc/vacancy-mirror/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Bind PostgreSQL to localhost only (not publicly reachable).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vacancy_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: ghcr.io/${GHCR_USER}/vacancy-mirror-backend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    env_file:
      - /etc/vacancy-mirror/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli telegram-bot
    networks:
      - internal   # → postgres, assistant-infer
      - egress     # → api.telegram.org, api.openai.com

  # Horizontal assistant inference replicas.
  # Backend can call them via:
  # ASSISTANT_INFER_URLS=http://assistant-infer-1:8090,http://assistant-infer-2:8090,http://assistant-infer-3:8090
  assistant-infer-1:
    image: ghcr.io/${GHCR_USER}/vacancy-mirror-backend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    env_file:
      - /etc/vacancy-mirror/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli assistant-infer --port 8090
    networks:
      - internal   # → postgres
      - egress     # → api.openai.com

  assistant-infer-2:
    image: ghcr.io/${GHCR_USER}/vacancy-mirror-backend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    env_file:
      - /etc/vacancy-mirror/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli assistant-infer --port 8090
    networks:
      - internal
      - egress

  assistant-infer-3:
    image: ghcr.io/${GHCR_USER}/vacancy-mirror-backend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    env_file:
      - /etc/vacancy-mirror/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli assistant-infer --port 8090
    networks:
      - internal
      - egress

  support-webhook:
    image: ghcr.io/${GHCR_USER}/vacancy-mirror-backend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    env_file:
      - /etc/vacancy-mirror/backend.env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli stripe-webhook --port 8080
    networks:
      - internal   # → postgres
      - egress     # → api.stripe.com, sendgrid, telegram

  api:
    image: ghcr.io/${GHCR_USER}/vacancy-mirror-api:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    env_file:
      - /etc/vacancy-mirror/backend.env
    ports:
      # Published to host so nginx (systemd) can reach it via 127.0.0.1:8000.
      # nginx runs on the host, not in Docker — it cannot use Docker DNS.
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal   # → postgres
      - egress     # → may need external APIs


  grafana-backend:
    image: grafana/grafana:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_BACKEND_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_BACKEND_ROOT_URL:-http://localhost:3001}
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - grafana-backend-data:/var/lib/grafana
      - /etc/vacancy-mirror/grafana-backend/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal   # → postgres only. NO internet access.

networks:
  internal:
    driver: bridge
    internal: true     # ← No internet access from this network
  egress:
    driver: bridge     # ← Normal bridge with internet access

volumes:
  postgres-data:
  grafana-backend-data:
