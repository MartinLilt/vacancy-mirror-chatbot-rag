# Nginx reverse proxy for api.vacancy-mirror.com
# Deployed to /etc/vacancy-mirror/nginx.conf by provision.sh

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.vacancy-mirror.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to FastAPI
server {
    listen 443 ssl;
    server_name api.vacancy-mirror.com;

    ssl_certificate     /etc/letsencrypt/live/api.vacancy-mirror.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vacancy-mirror.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Use Docker embedded DNS for lazy upstream resolution.
    # This prevents nginx from crashing if an upstream is temporarily unavailable.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /webhook {
        set $support_webhook_backend support-webhook;
        proxy_pass         http://$support_webhook_backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /support/ {
        set $support_webhook_backend support-webhook;
        proxy_pass         http://$support_webhook_backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $api_backend api;
        proxy_pass         http://$api_backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
