version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacancy_mirror
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vacancy_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper-webdev:
    build: .
    container_name: scraper-webdev
    restart: "no"
    volumes:
      - scraper-data:/data
    environment:
      DATA_DIR: /data
      CATEGORY_UID: "531770282580668418"
      PROXY_URL: ${PROXY_URL_WEBDEV:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DB_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/vacancy_mirror
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m vacancy_mirror_chatbot_rag.cli import-raw-to-db

volumes:
  postgres-data:
  scraper-data:
