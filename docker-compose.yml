version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacancy_mirror
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d vacancy_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      DB_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/vacancy_mirror
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m backend.cli telegram-bot

  scraper:
    build: ./scraper
    container_name: scraper
    restart: "no"
    environment:
      DB_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/vacancy_mirror
      PROXY_URL: ${PROXY_URL:-}
      CATEGORY_UID: ${CATEGORY_UID:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m scraper.cli

volumes:
  postgres-data:
